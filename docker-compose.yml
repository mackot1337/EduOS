version: '3.8'

services:
  eduos-db:
    image: ankane/pgvector:v0.5.1
    container_name: eduos_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - eduos_postgres_data:/var/lib/postgresql/data

volumes:
  eduos_postgres_data: